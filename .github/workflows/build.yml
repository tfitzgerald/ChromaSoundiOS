name: Build ChromaSound iOS

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: Build IPA
    # macOS runner with Xcode pre-installed — free for public repos
    runs-on: macos-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      # ── 3. Cache derived data ──────────────────────────────────────────────
      - name: Cache Xcode derived data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ hashFiles('**/*.swift', '**/*.pbxproj') }}
          restore-keys: xcode-

      # ── 4. Build for iOS Simulator (always — no signing needed) ───────────
      # Produces a .app bundle that can be run in the iOS Simulator
      - name: Build for Simulator
        run: |
          xcodebuild \
            -project ChromaSound.xcodeproj \
            -scheme ChromaSound \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build \
            | xcpretty || xcodebuild \
              -project ChromaSound.xcodeproj \
              -scheme ChromaSound \
              -sdk iphonesimulator \
              -configuration Debug \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO \
              ONLY_ACTIVE_ARCH=NO \
              build

      # ── 5. Archive for real device (release events + manual trigger) ───────
      # Requires Apple Developer signing — see README for secret setup
      - name: Install Apple signing certificate
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD:             ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_BASE64:   ${{ secrets.BUILD_PROVISION_BASE64 }}
          KEYCHAIN_PASSWORD:        ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate and provisioning profile
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo "$BUILD_PROVISION_BASE64"   | base64 --decode -o "$PP_PATH"
          # Create keychain and import
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k build.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain
          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive for device
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          xcodebuild \
            -project ChromaSound.xcodeproj \
            -scheme ChromaSound \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ChromaSound.xcarchive \
            archive

      - name: Export IPA
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ChromaSound.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # ── 6. Upload IPA as artifact ──────────────────────────────────────────
      - name: Upload IPA artifact
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ChromaSound-iOS-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/ChromaSound.ipa
          retention-days: 90

      # ── 7. Attach IPA to GitHub Release ───────────────────────────────────
      - name: Attach IPA to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/ipa/ChromaSound.ipa
          token: ${{ secrets.GITHUB_TOKEN }}
